<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Transfinite Number Line</title>
    <style>
        html,
        body {
            margin: 0;
            overflow: hidden;
            background: black;
            color: white;
            font-family: monospace;
            touch-action: none;
        }

        canvas {
            display: block;
        }

        #ui {
            position: fixed;
            bottom: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0);
            padding: 10px 14px;
            border-radius: 8px;
            z-index: 10;
        }
        
        #legend {
    	    position: fixed;
    	    top: 10px;
    	    right: 10px;
  	        font-family: serif;
    	    font-size: 24px;
    	    line-height: 1;
    	    text-align: right;
    	    pointer-events: none;
        }	
    </style>
</head>

<body>

    <div id="ui">
        <div><span id="ord" style="font-size: 20px;font-family: serif;"></span></div>
        <div>Zoom: <span id="zoomDisplay"></span></div>
        <div>FPS: <span id="fpsDisplay"></span></div>
        <div>World Position: <span id="worldDisplay"></span></div>
    </div>
    <div id="legend">
        <div style="color:red">Successor Ordinals</div>
		<div style="color:orange">Limit Ordinals</div>
		<div style="color:yellow">Power of ω</div>
		<div style="color:white">Tower of ω</div>
		<div style="color:#00FF00">ε<sub>0</sub> Ordinals</div>
    	<div style="color:cyan">Veblen Ordinals</div>
    	<div style="color:#ff73f6">Feferman–Schütte Ordinals</div>
    	<div style="color:blue">Bachmann–Howard Ordinals</div>
    	<div style="color:grey">Buchholz Ordinals</div>
    	<div style="color:lightblue">Primitves Ordinals</div>
    </div>

    <canvas id="canvas"></canvas>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/decimal.js/10.4.3/decimal.min.js"></script>
    <script src = "ordinal.js"></script>
    <script src = "render.js"></script>
</body>

</html>
